<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Sphere</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  background: #080808;
  color: #ccc;
  font-family: 'Courier New', monospace;
  height: 100vh;
  overflow: hidden;
}

#canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
}

canvas {
  cursor: grab;
  display: block;
}
canvas.dragging { cursor: grabbing; }

/* ── Panel ── */
#panel {
  width: 270px;
  flex-shrink: 0;
  background: #0e0e0e;
  border-left: 1px solid #1e1e1e;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#panel-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}

.section { margin-bottom: 18px; }

.section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #444;
  margin-bottom: 10px;
  padding-bottom: 4px;
  border-bottom: 1px solid #1e1e1e;
}

.row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 7px;
  font-size: 11px;
}

.row label {
  min-width: 72px;
  color: #777;
  flex-shrink: 0;
}

.row input[type=range] {
  flex: 1;
  height: 3px;
  accent-color: #4488ff;
}

.row .val {
  min-width: 28px;
  text-align: right;
  color: #555;
  font-size: 10px;
}

/* ── Ring system card ── */
.ring-card {
  background: #131313;
  border-radius: 4px;
  padding: 8px 8px 6px;
  margin-bottom: 8px;
  border-left: 3px solid #4488ff;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}

.card-name {
  flex: 1;
  background: transparent;
  border: none;
  color: #bbb;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  outline: none;
}
.card-name:focus { color: #eee; border-bottom: 1px solid #333; }

.card-color {
  width: 28px;
  height: 18px;
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
}

.card-remove {
  background: none;
  border: none;
  color: #444;
  cursor: pointer;
  font-size: 13px;
  padding: 0 2px;
  flex-shrink: 0;
  line-height: 1;
}
.card-remove:hover { color: #cc3333; }

/* ── Buttons ── */
button.action {
  background: #161622;
  border: 1px solid #2a2a3a;
  color: #888;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  width: 100%;
  margin-top: 2px;
}
button.action:hover { background: #1e1e30; color: #aaa; }

.toggle {
  background: #111;
  border: 1px solid #2a2a2a;
  color: #666;
  padding: 2px 8px;
  cursor: pointer;
  border-radius: 2px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
}
.toggle.on { background: #0d1a2e; border-color: #2255aa; color: #6699dd; }

#panel-foot {
  padding: 10px 12px;
  border-top: 1px solid #1a1a1a;
}

/* Hint */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: #333;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  pointer-events: none;
  transition: opacity 1s;
}
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="hint">drag to steer orbit</div>
</div>

<div id="panel">
  <div id="panel-scroll">

    <div class="section">
      <div class="section-title">Camera</div>
      <div class="row">
        <label>Orbit speed</label>
        <input type="range" id="orbitSpeed" min="0" max="100" value="30">
        <span class="val" id="orbitSpeedV">30</span>
      </div>
      <div class="row">
        <label>Orbit tilt</label>
        <input type="range" id="orbitTilt" min="0" max="75" value="28">
        <span class="val" id="orbitTiltV">28°</span>
      </div>
      <div class="row">
        <label>Distance</label>
        <input type="range" id="camDist" min="250" max="1400" value="680">
        <span class="val" id="camDistV">680</span>
      </div>
      <div class="row">
        <label>Field of view</label>
        <input type="range" id="fov" min="20" max="100" value="55">
        <span class="val" id="fovV">55°</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Rendering</div>
      <div class="row">
        <label>Glow</label>
        <input type="range" id="glow" min="0" max="24" value="9">
        <span class="val" id="glowV">9</span>
      </div>
      <div class="row">
        <label>Line alpha</label>
        <input type="range" id="alpha" min="10" max="100" value="85">
        <span class="val" id="alphaV">85%</span>
      </div>
      <div class="row">
        <label>Stars</label>
        <button class="toggle on" id="toggleStars">On</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Ring Systems</div>
      <div id="ring-list"></div>
      <button class="action" id="addBtn">+ Add Ring System</button>
    </div>

  </div>
  <div id="panel-foot">
    <button class="action" id="exportBtn">Export Frame (PNG)</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
// 3D Math
// ─────────────────────────────────────────────────

const dot   = (a,b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
const cross = (a,b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
const addV  = (a,b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]];
const subV  = (a,b) => [a[0]-b[0], a[1]-b[1], a[2]-b[2]];
const scaleV = (v,s) => [v[0]*s, v[1]*s, v[2]*s];

function norm(v) {
  const l = Math.sqrt(dot(v,v));
  return l < 1e-12 ? [0,1,0] : [v[0]/l, v[1]/l, v[2]/l];
}

function rotX(v, a) {
  const c=Math.cos(a), s=Math.sin(a);
  return [v[0], c*v[1]-s*v[2], s*v[1]+c*v[2]];
}
function rotY(v, a) {
  const c=Math.cos(a), s=Math.sin(a);
  return [c*v[0]+s*v[2], v[1], -s*v[0]+c*v[2]];
}
function rotZ(v, a) {
  const c=Math.cos(a), s=Math.sin(a);
  return [c*v[0]-s*v[1], s*v[0]+c*v[1], v[2]];
}

// Rodrigues rotation: rotate v around unit axis by angle a
function rotAround(v, axis, a) {
  const c=Math.cos(a), s=Math.sin(a), d=dot(v,axis);
  const cr=cross(axis,v);
  return [
    v[0]*c + cr[0]*s + axis[0]*d*(1-c),
    v[1]*c + cr[1]*s + axis[1]*d*(1-c),
    v[2]*c + cr[2]*s + axis[2]*d*(1-c)
  ];
}

// ─────────────────────────────────────────────────
// Stars
// ─────────────────────────────────────────────────

const STAR_R = 9000;
const STAR_COUNT = 320;
const starPts = [];
const starBright = [];
const starPhase = [];
const starSize = [];

for (let i = 0; i < STAR_COUNT; i++) {
  const theta = Math.acos(2*Math.random()-1);
  const phi   = Math.random() * Math.PI * 2;
  starPts.push([
    STAR_R * Math.sin(theta) * Math.cos(phi),
    STAR_R * Math.sin(theta) * Math.sin(phi),
    STAR_R * Math.cos(theta)
  ]);
  starBright.push(0.25 + Math.random() * 0.55);
  starPhase.push(Math.random() * Math.PI * 2);
  starSize.push(Math.random() < 0.12 ? 1.5 : 1);
}

// ─────────────────────────────────────────────────
// Ring Systems
// ─────────────────────────────────────────────────

const SPHERE_R  = 200;
const SEG_COUNT = 90;  // points per ring
let nextId = 0;

function makeSystem(opts) {
  return {
    id:            nextId++,
    name:          opts.name          ?? 'Ring',
    count:         opts.count         ?? 20,
    tiltX:         opts.tiltX         ?? 0,
    tiltZ:         opts.tiltZ         ?? 0,
    color:         opts.color         ?? '#4488ff',
    lineWidth:     opts.lineWidth     ?? 1.2,
    dash:          opts.dash          ?? [],
    precRate:      opts.precRate      ?? 0.00010,
    phase:         opts.phase         ?? 0,
  };
}

let systems = [
  makeSystem({ name:'Blue',  count:30, tiltX:  0, tiltZ:  0, color:'#2255ff', lineWidth:1.6, dash:[],     precRate:0.00008,  phase:0    }),
  makeSystem({ name:'Green', count:24, tiltX: 47, tiltZ: 22, color:'#22ff55', lineWidth:1.3, dash:[],     precRate:0.000130, phase:1.05 }),
  makeSystem({ name:'Red',   count:24, tiltX:-47, tiltZ:-22, color:'#ff2266', lineWidth:1.3, dash:[],     precRate:0.000110, phase:2.30 }),
  makeSystem({ name:'Dots',  count:18, tiltX: 20, tiltZ: 55, color:'#aaff33', lineWidth:1.0, dash:[2,5],  precRate:0.000180, phase:0.70 }),
];

function getRings(sys, time) {
  // System axis derived from tilt angles
  let axis = [0, 1, 0];
  axis = norm(rotX(rotZ(axis, sys.tiltZ * Math.PI/180), sys.tiltX * Math.PI/180));

  // A vector perpendicular to axis
  const ref  = Math.abs(axis[0]) < 0.9 ? [1,0,0] : [0,1,0];
  const perp = norm(cross(axis, ref));

  const precAngle = sys.phase + time * sys.precRate;
  const rings = [];

  for (let i = 0; i < sys.count; i++) {
    const phi = (i / sys.count) * Math.PI + precAngle;
    const n   = rotAround(perp, axis, phi);   // ring normal
    const u   = axis;                          // one tangent (⊥ to n since perp ⊥ axis)
    const v   = norm(cross(n, axis));          // other tangent

    const pts = [];
    for (let j = 0; j <= SEG_COUNT; j++) {
      const t  = (j / SEG_COUNT) * 2 * Math.PI;
      const ct = Math.cos(t), st = Math.sin(t);
      pts.push([
        SPHERE_R * (ct*u[0] + st*v[0]),
        SPHERE_R * (ct*u[1] + st*v[1]),
        SPHERE_R * (ct*u[2] + st*v[2])
      ]);
    }
    rings.push(pts);
  }
  return rings;
}

// ─────────────────────────────────────────────────
// Camera & Projection
// ─────────────────────────────────────────────────

let camAz  = 0;   // azimuth (auto-incremented each frame unless dragging)
let camElOffset = 0;   // elevation offset from drag
let isDragging = false;
let dragX0 = 0, dragY0 = 0, dragAz0 = 0, dragEl0 = 0;

function getCamera(az, el, dist) {
  const cosEl = Math.cos(el), sinEl = Math.sin(el);
  const cosAz = Math.cos(az), sinAz = Math.sin(az);
  const pos = [dist*sinAz*cosEl, dist*sinEl, dist*cosAz*cosEl];
  const fwd = norm(subV([0,0,0], pos));
  const wup = [0,1,0];
  const rgt = norm(cross(fwd, wup));
  const up  = norm(cross(rgt, fwd));
  return { pos, fwd, rgt, up };
}

function project(pt, cam, focal, cx, cy) {
  const d  = subV(pt, cam.pos);
  const xc = dot(d, cam.rgt);
  const yc = dot(d, cam.up);
  const zc = dot(d, cam.fwd);
  if (zc <= 0.5) return null;
  return [cx + focal*xc/zc, cy - focal*yc/zc];
}

// ─────────────────────────────────────────────────
// Canvas
// ─────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const size = Math.min(wrap.clientWidth, wrap.clientHeight, 900);
  canvas.width  = size;
  canvas.height = size;
}
window.addEventListener('resize', resize);
resize();

// ─────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────

let showStars = true;

function draw(ts) {
  const W = canvas.width, H = canvas.height;

  // ── Camera params
  const orbitSpeed = document.getElementById('orbitSpeed').value / 10000;
  const tiltAmp    = document.getElementById('orbitTilt').value  * Math.PI/180;
  const dist       = parseFloat(document.getElementById('camDist').value);
  const fovDeg     = parseFloat(document.getElementById('fov').value);
  const glowAmt    = parseFloat(document.getElementById('glow').value);
  const lineAlpha  = parseFloat(document.getElementById('alpha').value) / 100;

  const focal = W / (2 * Math.tan(fovDeg * Math.PI / 360));
  const cx = W/2, cy = H/2;

  // Satellite orbit: azimuth auto-increments, elevation bobs sinusoidally
  const el = tiltAmp * Math.sin(ts * 0.00028) + camElOffset;
  const cam = getCamera(camAz, el, dist);

  // ── Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // ── Stars
  if (showStars) {
    ctx.fillStyle = '#fff';
    for (let si = 0; si < starPts.length; si++) {
      const p = project(starPts[si], cam, focal, cx, cy);
      if (!p) continue;
      if (p[0] < 0 || p[0] > W || p[1] < 0 || p[1] > H) continue;
      const twinkle = 0.65 + 0.35 * Math.sin(ts * 0.0015 + starPhase[si]);
      ctx.globalAlpha = starBright[si] * twinkle;
      const sz = starSize[si];
      ctx.fillRect(p[0]-sz/2, p[1]-sz/2, sz, sz);
    }
    ctx.globalAlpha = 1;
  }

  // ── Rings
  ctx.globalAlpha = lineAlpha;
  for (const sys of systems) {
    const allRings = getRings(sys, ts);
    ctx.strokeStyle   = sys.color;
    ctx.lineWidth     = sys.lineWidth;
    ctx.shadowColor   = sys.color;
    ctx.shadowBlur    = glowAmt;
    ctx.setLineDash(sys.dash);

    for (const ring of allRings) {
      ctx.beginPath();
      let penDown = false, prevNull = false;
      for (const pt of ring) {
        const p = project(pt, cam, focal, cx, cy);
        if (!p) { prevNull = true; continue; }
        if (!penDown || prevNull) { ctx.moveTo(p[0], p[1]); penDown = true; }
        else                      { ctx.lineTo(p[0], p[1]); }
        prevNull = false;
      }
      ctx.stroke();
    }
  }

  ctx.shadowBlur  = 0;
  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
}

// ─────────────────────────────────────────────────
// Animation Loop
// ─────────────────────────────────────────────────

let lastTs = 0;

function loop(ts) {
  const dt = ts - lastTs;
  lastTs = ts;

  if (!isDragging) {
    const speed = document.getElementById('orbitSpeed').value / 10000;
    camAz += speed * dt;
  }

  draw(ts);
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });

// ─────────────────────────────────────────────────
// Mouse / Touch
// ─────────────────────────────────────────────────

function dragStart(x, y) {
  isDragging = true;
  dragX0  = x;  dragY0  = y;
  dragAz0 = camAz; dragEl0 = camElOffset;
  canvas.classList.add('dragging');
}
function dragMove(x, y) {
  if (!isDragging) return;
  camAz       = dragAz0 + (x - dragX0) * 0.005;
  camElOffset = Math.max(-1.35, Math.min(1.35, dragEl0 - (y - dragY0) * 0.005));
}
function dragEnd() {
  isDragging = false;
  canvas.classList.remove('dragging');
}

canvas.addEventListener('mousedown',  e => dragStart(e.clientX, e.clientY));
canvas.addEventListener('mousemove',  e => dragMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup',    dragEnd);
canvas.addEventListener('mouseleave', dragEnd);

canvas.addEventListener('touchstart', e => { dragStart(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive:false });
canvas.addEventListener('touchmove',  e => { dragMove(e.touches[0].clientX, e.touches[0].clientY);  e.preventDefault(); }, { passive:false });
canvas.addEventListener('touchend',   dragEnd);

// Hide hint after first drag
canvas.addEventListener('mousedown', () => {
  document.getElementById('hint').style.opacity = '0';
}, { once: true });

// ─────────────────────────────────────────────────
// Controls UI
// ─────────────────────────────────────────────────

function bindSlider(id, valId, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => { vl.textContent = fmt(sl.value); });
}
bindSlider('orbitSpeed', 'orbitSpeedV', v => v);
bindSlider('orbitTilt',  'orbitTiltV',  v => v + '°');
bindSlider('camDist',    'camDistV',    v => v);
bindSlider('fov',        'fovV',        v => v + '°');
bindSlider('glow',       'glowV',       v => v);
bindSlider('alpha',      'alphaV',      v => v + '%');

document.getElementById('toggleStars').addEventListener('click', function() {
  showStars = !showStars;
  this.textContent = showStars ? 'On' : 'Off';
  this.classList.toggle('on', showStars);
});

// ─────────────────────────────────────────────────
// Ring System UI
// ─────────────────────────────────────────────────

function buildRingUI() {
  const list = document.getElementById('ring-list');
  list.innerHTML = '';

  for (const sys of systems) {
    const card = document.createElement('div');
    card.className = 'ring-card';
    card.style.borderLeftColor = sys.color;
    card.dataset.id = sys.id;

    card.innerHTML = `
      <div class="card-header">
        <input class="card-name" type="text" value="${esc(sys.name)}" data-field="name">
        <input class="card-color" type="color" value="${sys.color}" data-field="color">
        <button class="card-remove" title="Remove">✕</button>
      </div>
      <div class="row">
        <label>Rings</label>
        <input type="range" min="4" max="60" value="${sys.count}" data-field="count">
        <span class="val">${sys.count}</span>
      </div>
      <div class="row">
        <label>Tilt X</label>
        <input type="range" min="-90" max="90" value="${sys.tiltX}" data-field="tiltX">
        <span class="val">${sys.tiltX}°</span>
      </div>
      <div class="row">
        <label>Tilt Z</label>
        <input type="range" min="-90" max="90" value="${sys.tiltZ}" data-field="tiltZ">
        <span class="val">${sys.tiltZ}°</span>
      </div>
      <div class="row">
        <label>Precess</label>
        <input type="range" min="0" max="100" value="${Math.round(sys.precRate*1e6)}" data-field="precRate">
        <span class="val">${Math.round(sys.precRate*1e6)}</span>
      </div>
      <div class="row">
        <label>Line width</label>
        <input type="range" min="5" max="40" value="${sys.lineWidth*10}" data-field="lineWidth">
        <span class="val">${sys.lineWidth}</span>
      </div>
      <div class="row">
        <label>Dotted</label>
        <button class="toggle ${ sys.dash.length ? 'on' : '' }" data-field="dash">${ sys.dash.length ? 'On' : 'Off' }</button>
      </div>
    `;

    // Bind inputs
    card.querySelectorAll('[data-field]').forEach(el => {
      const field = el.dataset.field;
      const ev    = el.tagName === 'BUTTON' ? 'click' : 'input';

      el.addEventListener(ev, () => {
        const target = systems.find(s => s.id === sys.id);
        if (!target) return;

        if (field === 'name') {
          target.name = el.value;
        } else if (field === 'color') {
          target.color = el.value;
          card.style.borderLeftColor = el.value;
        } else if (field === 'count') {
          target.count = parseInt(el.value);
          el.nextElementSibling.textContent = el.value;
        } else if (field === 'tiltX') {
          target.tiltX = parseFloat(el.value);
          el.nextElementSibling.textContent = el.value + '°';
        } else if (field === 'tiltZ') {
          target.tiltZ = parseFloat(el.value);
          el.nextElementSibling.textContent = el.value + '°';
        } else if (field === 'precRate') {
          target.precRate = parseFloat(el.value) / 1e6;
          el.nextElementSibling.textContent = el.value;
        } else if (field === 'lineWidth') {
          target.lineWidth = parseFloat(el.value) / 10;
          el.nextElementSibling.textContent = target.lineWidth.toFixed(1);
        } else if (field === 'dash') {
          target.dash = target.dash.length ? [] : [2, 5];
          el.textContent = target.dash.length ? 'On' : 'Off';
          el.classList.toggle('on', target.dash.length > 0);
        }
      });
    });

    // Remove button
    card.querySelector('.card-remove').addEventListener('click', () => {
      systems = systems.filter(s => s.id !== sys.id);
      buildRingUI();
    });

    list.appendChild(card);
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

document.getElementById('addBtn').addEventListener('click', () => {
  const hue = Math.floor(Math.random() * 360);
  systems.push(makeSystem({
    name:     `Ring ${systems.length + 1}`,
    count:    22,
    tiltX:    (Math.random()*180 - 90) | 0,
    tiltZ:    (Math.random()*180 - 90) | 0,
    color:    `hsl(${hue},100%,60%)`,
    lineWidth: 1.2,
    dash:     [],
    precRate: 0.00008 + Math.random() * 0.00015,
    phase:    Math.random() * Math.PI * 2,
  }));
  buildRingUI();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = `orbital-sphere-${Date.now()}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
});

buildRingUI();
</script>
</body>
</html>
