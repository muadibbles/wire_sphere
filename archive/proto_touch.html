<body style=margin:0><canvas id=c><script>
const M=Math,q=c.getContext('2d');
const f=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],cr=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],sb=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],nl=v=>{const l=M.hypot(...v);return l<1e-9?[0,1,0]:v.map(x=>x/l)};
const ra=(v,a,t)=>{const c=M.cos(t),s=M.sin(t),d=f(v,a),r=cr(a,v);return v.map((x,i)=>x*c+r[i]*s+a[i]*d*(1-c))};
let az=0,el=0,drag=0,daz=0,dx=0,dy=0,de=0,pt=0,W;
const S=[[28,0,0,'#2255ff',1.5,[],.8e-4,0],[22,47,22,'#22ff55',1.2,[],.13e-3,1],[22,-47,-22,'#ff2266',1.2,[],.11e-3,2.3],[16,20,55,'#aaff33',1,[2,5],.18e-3,.7]];
const rs=()=>W=c.width=c.height=M.min(innerWidth,innerHeight);
rs();onresize=rs;
c.addEventListener('touchstart',e=>{drag=1;dx=e.touches[0].clientX;dy=e.touches[0].clientY;daz=az;de=el;e.preventDefault()},{passive:0});
c.addEventListener('touchmove',e=>{az=daz+(e.touches[0].clientX-dx)*.005;el=M.max(-1.3,M.min(1.3,de+(dy-e.touches[0].clientY)*.005));e.preventDefault()},{passive:0});
c.addEventListener('touchend',()=>drag=0);
requestAnimationFrame(function L(ts){
  if(!drag)az+=.0003*(ts-pt);pt=ts;
  const E=.4*M.sin(ts*.00028)+el,ce=M.cos(E),se=M.sin(E),pos=[680*M.sin(az)*ce,680*se,680*M.cos(az)*ce];
  const fwd=nl(pos.map(v=>-v)),rgt=nl(cr(fwd,[0,1,0])),up=nl(cr(rgt,fwd)),FL=W*.6,cx=W/2;
  const pr=p=>{const d=sb(p,pos),xc=f(d,rgt),yc=f(d,up),zc=f(d,fwd);return zc<.5?0:[cx+FL*xc/zc,cx-FL*yc/zc]};
  q.fillStyle='#000';q.fillRect(0,0,W,W);
  S.forEach(([cnt,tx,tz,col,lw,dash,prc,ph])=>{
    const D=M.PI/180,stx=M.sin(tx*D),ctx=M.cos(tx*D),stz=M.sin(tz*D),ctz=M.cos(tz*D);
    const axis=nl([-stz,ctx*ctz,stx*ctz]),perp=nl(cr(axis,M.abs(axis[0])<.9?[1,0,0]:[0,1,0]));
    q.strokeStyle=col;q.lineWidth=lw;q.shadowColor=col;q.shadowBlur=9;q.setLineDash(dash);
    for(let i=0;i<cnt;i++){
      const n=ra(perp,axis,i/cnt*M.PI+ph+ts*prc),u=axis,v=nl(cr(n,axis));
      q.beginPath();let pen=0,pv=0;
      for(let j=0;j<=64;j++){const t=j/64*6.283,p=pr([200*(M.cos(t)*u[0]+M.sin(t)*v[0]),200*(M.cos(t)*u[1]+M.sin(t)*v[1]),200*(M.cos(t)*u[2]+M.sin(t)*v[2])]);if(!p){pv=1;continue}pen&&!pv?q.lineTo(...p):q.moveTo(...p);pen=1;pv=0}
      q.stroke();
    }
  });
  q.shadowBlur=0;q.setLineDash([]);
  requestAnimationFrame(L);
});
</script>
