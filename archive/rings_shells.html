<body style=margin:0><canvas id=c style="touch-action:none"></canvas><script>
const M=Math,q=c.getContext('2d'),N=20,SEG=130;
let az=0,el=0,drag=0,daz=0,dx=0,dy=0,de=0,prev=0,W;

const shells=[
  {r:228,color:'#ff3355',glow:'#ff2244'},
  {r:238,color:'#33ff77',glow:'#22ff66'},
  {r:248,color:'#4488ff',glow:'#3377ff'},
];

const T=39*M.PI/180,ct=M.cos(T),st=M.sin(T);
shells.forEach(s=>{
  s.rings=Array.from({length:N},(_,i)=>{
    const phi=M.PI*(i+.5)/N-M.PI/2,y=s.r*M.sin(phi),r=s.r*M.cos(phi);
    return Array.from({length:SEG+1},(_,j)=>{const t=j/SEG*6.283,x=r*M.cos(t),z=r*M.sin(t);return[x,y*ct-z*st,y*st+z*ct]});
  });
});

const f=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],cr=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],sb=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],nl=v=>{const l=M.hypot(...v);return l<1e-9?[0,1,0]:v.map(x=>x/l)};

const rs=()=>W=c.width=c.height=M.min(innerWidth,innerHeight);rs();onresize=rs;
c.ontouchstart=e=>{drag=1;dx=e.touches[0].clientX;dy=e.touches[0].clientY;daz=az;de=el};
c.ontouchmove=e=>{az=daz+(e.touches[0].clientX-dx)*.005;el=M.max(-1.3,M.min(1.3,de+(dy-e.touches[0].clientY)*.005))};
c.ontouchend=()=>drag=0;

requestAnimationFrame(function L(ts){
  if(!drag)az+=.0003*(ts-prev);prev=ts;
  const E=.3*M.sin(ts*.00028)+el,ce=M.cos(E),se=M.sin(E);
  const pos=[570*M.sin(az)*ce,570*se,570*M.cos(az)*ce];
  const fwd=nl(pos.map(v=>-v)),rgt=nl(cr(fwd,[0,1,0])),up=nl(cr(rgt,fwd)),FL=W*.85,cx=W/2;
  const pr=v=>{const d=sb(v,pos),xc=f(d,rgt),yc=f(d,up),zc=f(d,fwd);return zc<.5?0:[cx+FL*xc/zc,cx-FL*yc/zc]};

  q.fillStyle='#000';q.fillRect(0,0,W,W);
  for(const s of shells){
    q.fillStyle=s.color;q.shadowColor=s.glow;q.shadowBlur=8;
    q.beginPath();
    for(const ring of s.rings){
      for(const v of ring){const p=pr(v);if(!p)continue;q.moveTo(p[0]+1.5,p[1]);q.arc(p[0],p[1],1.5,0,6.283)}
    }
    q.fill();
  }
  q.shadowBlur=0;
  requestAnimationFrame(L);
});
</script>
