<body style=margin:0><canvas id=c style="touch-action:none"><script>
const M=Math,q=c.getContext('2d'),R=220,N=20,SEG=80;
let az=0,el=0,drag=0,daz=0,dx=0,dy=0,de=0,prev=0,W;

const rings=Array.from({length:N},(_,i)=>{
  const phi=M.PI*(i+.5)/N-M.PI/2,y=R*M.sin(phi),r=R*M.cos(phi);
  return Array.from({length:SEG+1},(_,j)=>{const t=j/SEG*6.283;return[r*M.cos(t),y,r*M.sin(t)]});
});

const f=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],cr=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],sb=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],nl=v=>{const l=M.hypot(...v);return l<1e-9?[0,1,0]:v.map(x=>x/l)};

const rs=()=>W=c.width=c.height=M.min(innerWidth,innerHeight);rs();onresize=rs;
c.ontouchstart=e=>{drag=1;dx=e.touches[0].clientX;dy=e.touches[0].clientY;daz=az;de=el};
c.ontouchmove=e=>{az=daz+(e.touches[0].clientX-dx)*.005;el=M.max(-1.3,M.min(1.3,de+(dy-e.touches[0].clientY)*.005))};
c.ontouchend=()=>drag=0;

requestAnimationFrame(function L(ts){
  if(!drag)az+=.0003*(ts-prev);prev=ts;
  const E=.3*M.sin(ts*.00028)+el,ce=M.cos(E),se=M.sin(E);
  const pos=[680*M.sin(az)*ce,680*se,680*M.cos(az)*ce];
  const fwd=nl(pos.map(v=>-v)),rgt=nl(cr(fwd,[0,1,0])),up=nl(cr(rgt,fwd)),FL=W*.6,cx=W/2;
  const pr=v=>{const d=sb(v,pos),xc=f(d,rgt),yc=f(d,up),zc=f(d,fwd);return zc<.5?0:[cx+FL*xc/zc,cx-FL*yc/zc]};

  q.fillStyle='#000';q.fillRect(0,0,W,W);
  q.strokeStyle='#4488ff';q.lineWidth=1.5;q.shadowColor='#4488ff';q.shadowBlur=8;
  for(const ring of rings){
    q.beginPath();let pen=0,pv=0;
    for(const v of ring){const p=pr(v);if(!p){pv=1;continue}pen&&!pv?q.lineTo(...p):q.moveTo(...p);pen=1;pv=0}
    q.stroke();
  }
  q.shadowBlur=0;
  requestAnimationFrame(L);
});
</script>
