<!DOCTYPE html>
<body style="margin:0;background:#000;overflow:hidden">
<canvas id=c style="touch-action:none;display:block"></canvas>

<div id=panel style="position:fixed;top:12px;right:12px;background:rgba(0,0,0,.75);border:1px solid #333;border-radius:8px;padding:14px 16px;color:#ccc;font:12px/1.8 monospace;min-width:220px;user-select:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="color:#fff;font-size:13px;letter-spacing:.05em">CONTROLS</span>
    <button id=collapseBtn onclick="togglePanel()" style="background:none;border:1px solid #555;border-radius:4px;color:#aaa;cursor:pointer;font:11px monospace;padding:1px 6px;line-height:1.4">▲</button>
  </div>
  <div id=panelBody>
  <div style="margin-bottom:4px">
    <label style="display:flex;gap:6px;align-items:center;cursor:pointer">
      <input type=checkbox id=starToggle checked style="accent-color:#4488ff;width:14px;height:14px">
      <span style="color:#aaa">star field</span>
    </label>
  </div>
  <div id=starSliders></div>
  <div style="border-top:1px solid #333;margin:8px 0"></div>
  <div style="margin-bottom:4px">
    <label style="display:flex;gap:6px;align-items:center;cursor:pointer">
      <input type=checkbox id=orbitToggle checked style="accent-color:#4488ff;width:14px;height:14px">
      <span style="color:#aaa">orbit lines</span>
    </label>
  </div>
  <div style="margin-bottom:4px">
    <label style="display:flex;gap:6px;align-items:center;cursor:pointer">
      <input type=checkbox id=equatorialToggle style="accent-color:#4488ff;width:14px;height:14px">
      <span style="color:#aaa">equatorial orbits</span>
    </label>
  </div>
  <div style="border-top:1px solid #333;margin:8px 0"></div>
  <div style="margin-bottom:4px">
    <label style="display:flex;gap:6px;align-items:center;cursor:pointer">
      <input type=checkbox id=camLock style="accent-color:#4488ff;width:14px;height:14px">
      <span style="color:#aaa">lock camera</span>
    </label>
  </div>
  <div style="border-top:1px solid #333;margin:8px 0"></div>
  </div><!-- /panelBody -->
</div>

<div style="position:fixed;bottom:8px;left:10px;color:#333;font:18px monospace;pointer-events:none">v0.1</div>

<script>
let panelCollapsed=false;
function togglePanel(){
  panelCollapsed=!panelCollapsed;
  document.getElementById('panelBody').style.display=panelCollapsed?'none':'';
  document.getElementById('collapseBtn').textContent=panelCollapsed?'▼':'▲';
}
</script>

<script>
const M=Math,q=c.getContext('2d');
let az=0,el=0,drag=0,daz=0,mx=0,my=0,de=0,prev=0,W;

const lsGet=(k,fb)=>{const v=localStorage.getItem('gfx_'+k);return v===null?fb:v};
const lsSet=(k,v)=>localStorage.setItem('gfx_'+k,v);

let showStars=lsGet('showStars','true')==='true';
let showOrbit=lsGet('showOrbit','true')==='true';
let equatorialOrbits=lsGet('equatorialOrbits','false')==='true';

// three star layers: far (dim), mid, near (bright)
const starLayers=[
  {rMin:20000,rMax:28000,count:600,szMin:.3,szMax:.6, opacity:.15, label:'stars far'},
  {rMin:12000,rMax:18000,count:500,szMin:.4,szMax:.9, opacity:.45, label:'stars mid'},
  {rMin: 8000,rMax:11000,count:400,szMin:.5,szMax:1.7,opacity:.8,  label:'stars near'},
];
function genLayer(L){const a=[];for(let i=0;i<L.count;i++){const th=M.random()*6.283,ph=M.acos(2*M.random()-1);const r=L.rMin+M.random()*(L.rMax-L.rMin);const sz=L.szMin+M.random()*(L.szMax-L.szMin);a.push([r*M.sin(ph)*M.cos(th),r*M.sin(ph)*M.sin(th),r*M.cos(ph),sz]);}return a;}
starLayers.forEach((L,i)=>{
  L.opacity=parseFloat(lsGet('sl_opacity_'+i, L.opacity));
  L.count=parseInt(lsGet('sl_count_'+i, L.count));
  L.pts=genLayer(L);
});

function wireToggle(id,init,onChange){const el=document.getElementById(id);el.checked=init;el.onchange=e=>onChange(e.target.checked)}
wireToggle('starToggle',showStars,v=>{showStars=v;lsSet('showStars',v);document.getElementById('starSliders').style.opacity=v?1:.4});
wireToggle('orbitToggle',showOrbit,v=>{showOrbit=v;lsSet('showOrbit',v)});
wireToggle('equatorialToggle',equatorialOrbits,v=>{equatorialOrbits=v;lsSet('equatorialOrbits',v)});

// star layer sliders (brightness + count per layer)
const starDiv=document.getElementById('starSliders');
starLayers.forEach((L,i)=>{
  const d=document.createElement('div');
  d.innerHTML=`
  <label style="display:flex;gap:6px;align-items:center">
    <span style="width:110px;color:#aaa">${L.label} bright</span>
    <input id=sbr_${i} type=range min=0 max=1 step=.01 value=${L.opacity} style="flex:1;accent-color:#4488ff">
    <span id=sbrL_${i} style="width:38px;text-align:right;color:#fff">${L.opacity.toFixed(2)}</span>
  </label>
  <label style="display:flex;gap:6px;align-items:center">
    <span style="width:110px;color:#aaa">${L.label} count</span>
    <input id=scnt_${i} type=range min=0 max=1500 step=10 value=${L.count} style="flex:1;accent-color:#4488ff">
    <span id=scntL_${i} style="width:38px;text-align:right;color:#fff">${L.count}</span>
  </label>`;
  starDiv.appendChild(d);
  d.querySelector('#sbr_'+i).oninput=e=>{L.opacity=parseFloat(e.target.value);document.getElementById('sbrL_'+i).textContent=L.opacity.toFixed(2);lsSet('sl_opacity_'+i,L.opacity)};
  d.querySelector('#scnt_'+i).oninput=e=>{L.count=parseInt(e.target.value);document.getElementById('scntL_'+i).textContent=L.count;L.pts=genLayer(L);lsSet('sl_count_'+i,L.count)};
});

// live params
const P={
  cam:   {v:570,  min:300, max:7200, label:'zoom (cam dist)'},
  fl:    {v:31,   min:14,  max:200, label:'focal len (mm)', step:1},
  r0:    {v:228,  min:100, max:400, label:'inner radius'},
  gap:   {v:10,   min:2,   max:60,  label:'shell gap'},
  N:     {v:20,   min:4,   max:40,  label:'rings',      int:true},
  SEG:   {v:130,  min:20,  max:300, label:'dots/ring',  int:true},
  dot:   {v:1.5,  min:.5,  max:5,   label:'dot size',   step:.1},
  tilt:  {v:39,   min:0,   max:90,  label:'tilt (deg)'},
  speed: {v:.0003,min:0,   max:.001,label:'speed',      step:.00005},
  moons: {v:3,    min:0,   max:8,   label:'moon count', int:true},
  moonSz:{v:4,    min:1,   max:50,  label:'moon size',  step:.5},
  moonR: {v:320,  min:150, max:2800, label:'moon orbit r'},
  moonInc:{v:45,  min:0,   max:180, label:'moon incline'},
  moonSpd:{v:.0008,min:0,  max:.003,label:'moon speed', step:.0001},
  moonBr: {v:1,    min:0,   max:1,   label:'moon brightness',step:.01},
  moonSpread:{v:40, min:0,  max:180, label:'incline spread'},
  moonRVar:  {v:.4,  min:0,   max:1,   label:'moon orbit var', step:.01},
  moonSzVar: {v:.5,  min:0,   max:1,   label:'moon size var', step:.01},
  orbitDots:{v:80,  min:10,  max:300, label:'orbit dots', int:true},
};
for(const [k,d] of Object.entries(P))d.v=d.int?parseInt(lsGet('p_'+k,d.v)):parseFloat(lsGet('p_'+k,d.v));

// build sliders
const panel=document.getElementById('panelBody');
for(const [k,d] of Object.entries(P)){
  const row=document.createElement('div');
  const step=d.step||(d.int?1:.5);
  row.innerHTML=`<label style="display:flex;gap:6px;align-items:center">
    <span style="width:110px;color:#aaa">${d.label}</span>
    <input type=range min=${d.min} max=${d.max} step=${step} value=${d.v} style="flex:1;accent-color:#4488ff">
    <span id=lbl_${k} style="width:38px;text-align:right;color:#fff">${d.v}</span>
  </label>`;
  panel.appendChild(row);
  const inp=row.querySelector('input');
  inp.oninput=()=>{
    d.v=d.int?parseInt(inp.value):parseFloat(inp.value);
    document.getElementById('lbl_'+k).textContent=d.v;
    lsSet('p_'+k,d.v);
    rebuild();
  };
}

const shells=[
  {color:'#ff3355',glow:'#ff2244'},
  {color:'#33ff77',glow:'#22ff66'},
  {color:'#4488ff',glow:'#3377ff'},
];

function rebuild(){
  const T=P.tilt.v*M.PI/180,ct=M.cos(T),st=M.sin(T);
  const N=P.N.v,SEG=P.SEG.v;
  shells.forEach((s,i)=>{
    const r=P.r0.v+i*P.gap.v;
    s.r=r;
    s.rings=Array.from({length:N},(_,ii)=>{
      const phi=M.PI*(ii+.5)/N-M.PI/2,y=r*M.sin(phi),rr=r*M.cos(phi);
      return Array.from({length:SEG+1},(_,j)=>{
        const t=j/SEG*6.283,x=rr*M.cos(t),z=rr*M.sin(t);
        return[x,y*ct-z*st,y*st+z*ct];
      });
    });
  });
}
rebuild();

const rs=()=>W=c.width=c.height=M.min(innerWidth,innerHeight);
rs();onresize=rs;

c.onmousedown=e=>{drag=1;mx=e.clientX;my=e.clientY;daz=az;de=el};
c.onmousemove=e=>{if(!drag)return;az=daz+(e.clientX-mx)*.005;el=M.max(-1.3,M.min(1.3,de+(my-e.clientY)*.005))};
c.onmouseup=c.onmouseleave=()=>drag=0;
c.ontouchstart=e=>{drag=1;mx=e.touches[0].clientX;my=e.touches[0].clientY;daz=az;de=el};
c.ontouchmove=e=>{az=daz+(e.touches[0].clientX-mx)*.005;el=M.max(-1.3,M.min(1.3,de+(my-e.touches[0].clientY)*.005))};
c.ontouchend=()=>drag=0;

const PHI=2.39996;
const f=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cr=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const sb=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const nl=v=>{const l=M.hypot(...v);return l<1e-9?[0,1,0]:v.map(x=>x/l)};
const moonPt=(mr,cn,sn,ci,si,ct,st)=>[mr*(cn*ct-sn*ci*st),mr*si*st,mr*(sn*ct+cn*ci*st)];

requestAnimationFrame(function L(ts){
  const locked=camLock.checked;
  if(!drag&&!locked)az+=P.speed.v*(ts-prev);
  prev=ts;
  const E=locked?el:.3*M.sin(ts*.00028)+el,ce=M.cos(E),se=M.sin(E);
  const d=P.cam.v;
  const pos=[d*M.sin(az)*ce,d*se,d*M.cos(az)*ce];
  const fwd=nl([-pos[0],-pos[1],-pos[2]]),rgt=nl(cr(fwd,[0,1,0])),up=nl(cr(rgt,fwd));
  const FL=W*P.fl.v/36,cx=W/2;
  const pr=v=>{const dv=sb(v,pos),xc=f(dv,rgt),yc=f(dv,up),zc=f(dv,fwd);return zc<.5?null:[cx+FL*xc/zc,cx-FL*yc/zc]};
  const drawMoon=m=>{const p=pr(m.mv);if(!p)return;q.shadowColor=m.color;q.shadowBlur=18;q.fillStyle=m.color;q.beginPath();q.arc(p[0],p[1],m.ms,0,6.283);q.fill()};

  q.fillStyle='#000';q.fillRect(0,0,W,W);

  if(showStars){
    q.shadowBlur=0;
    for(const layer of starLayers){
      if(layer.opacity===0)continue;
      q.fillStyle=`rgba(255,255,255,${layer.opacity})`;
      q.beginPath();
      for(const v of layer.pts){const p=pr(v);if(!p)continue;q.moveTo(p[0]+v[3],p[1]);q.arc(p[0],p[1],v[3],0,6.283);}
      q.fill();
    }
  }

  const mc=P.moons.v;
  const moonData=[];
  if(mc>0){
    const baseMr=P.moonR.v;
    const baseInc=equatorialOrbits?0:P.moonInc.v*M.PI/180,spread=equatorialOrbits?0:P.moonSpread.v*M.PI/180;
    for(let i=0;i<mc;i++){
      const mr=M.max(10,baseMr*(1+P.moonRVar.v*M.sin(i*PHI*2.1+0.7)));
      const ms=M.max(.5,P.moonSz.v*(1+P.moonSzVar.v*M.sin(i*PHI*1.7+3.1)));
      const hue=(i*360/mc)|0;
      const color=`hsl(${hue},80%,65%)`;
      const inc=baseInc+spread*M.sin(i*PHI+1.0);
      const node=i*PHI;
      const si=M.sin(inc),ci=M.cos(inc),sn=M.sin(node),cn=M.cos(node);
      const th=ts*P.moonSpd.v+6.283*i/mc;
      const ct=M.cos(th),st=M.sin(th);
      const mv=moonPt(mr,cn,sn,ci,si,ct,st);
      const behind=mv[0]*pos[0]+mv[1]*pos[1]+mv[2]*pos[2]<0;
      moonData.push({mv,color,behind,i,inc,si,ci,sn,cn,mr,ms});
    }
  }

  // orbit lines + back moons — drawn before planet dots (occlusion order)
  if(mc>0){
    const od=P.orbitDots.v;
    q.globalAlpha=P.moonBr.v;
    for(const m of moonData){
      if(showOrbit){
        q.shadowColor=m.color;q.shadowBlur=4;q.fillStyle=m.color;
        q.beginPath();
        for(let j=0;j<od;j++){
          const t=j/od*6.283,ct2=M.cos(t),st2=M.sin(t);
          const ov=moonPt(m.mr,m.cn,m.sn,m.ci,m.si,ct2,st2);
          const p=pr(ov);if(!p)continue;
          q.moveTo(p[0]+1.5,p[1]);q.arc(p[0],p[1],1.5,0,6.283);
        }
        q.fill();
      }
      if(m.behind)drawMoon(m);
    }
    q.globalAlpha=1;
  }

  const dot=P.dot.v;
  for(const s of shells){
    q.fillStyle=s.color;q.shadowColor=s.glow;q.shadowBlur=8;
    q.beginPath();
    for(const ring of s.rings)
      for(const v of ring){const p=pr(v);if(!p)continue;q.moveTo(p[0]+dot,p[1]);q.arc(p[0],p[1],dot,0,6.283)}
    q.fill();
  }

  if(mc>0){
    q.globalAlpha=P.moonBr.v;
    for(const m of moonData){
      if(!m.behind)drawMoon(m);
    }
    q.globalAlpha=1;
  }
  q.shadowBlur=0;
  requestAnimationFrame(L);
});
</script>
