<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>orbital sphere — install on R1</title>
<style>
  body{margin:0;background:#000;color:#ccc;font:14px/1.6 monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:24px;box-sizing:border-box}
  h1{color:#fff;font-size:18px;letter-spacing:.05em;margin:0}
  p{color:#888;margin:0;text-align:center;max-width:320px}
  .qr{border:1px solid #333;border-radius:8px;padding:16px;background:#111}
  .qr img{display:block;width:480px;height:480px;image-rendering:pixelated}
  .steps{color:#666;font-size:12px;text-align:left;max-width:320px}
  .steps li{margin-bottom:6px}
  a{color:#4488ff;text-decoration:none}
</style>
</head>
<body>
<h1>orbital sphere</h1>
<p>animated wire sphere with orbital moons — built for the Rabbit R1</p>
<div class=qr>
  <img src=qr.png alt="scan with R1 to install">
</div>
<ol class=steps>
  <li>On your R1, open <strong>Creations</strong></li>
  <li>Tap <strong>Add via QR code</strong></li>
  <li>Scan the code above</li>
  <li>Tap to toggle rotation lock &mdash; scroll wheel adjusts elevation</li>
</ol>
<p><a href=index.html>preview in browser →</a></p>
</body>
</html>
